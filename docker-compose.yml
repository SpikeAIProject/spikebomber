version: '3.9'

networks:
  spike-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: spike-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spike_user
      POSTGRES_PASSWORD: spike_password
      POSTGRES_DB: spike_ai_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - spike-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spike_user -d spike_ai_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # Redis Cache & Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: spike-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - spike-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # NestJS API Server
  # ============================================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: spike-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://spike_user:spike_password@postgres:5432/spike_ai_db?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      API_PORT: 4000
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION:-us-central1}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      AES_ENCRYPTION_KEY: ${AES_ENCRYPTION_KEY:-dev-aes-key-32-chars-minimum!!}
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    networks:
      - spike-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================
  # Next.js Web Application
  # ============================================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: spike-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api:4000/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/src
    networks:
      - spike-network
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================
  # Next.js Admin Panel
  # ============================================================
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      target: development
    container_name: spike-admin
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api:4000/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - '3001:3001'
    volumes:
      - ./apps/admin/src:/app/src
    networks:
      - spike-network
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
